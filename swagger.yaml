          $ref: '#/components/responses/Deleted'
        '404':
          $ref: '#/components/responses/NotFound'

# ── Components ─────────────────────────────────────────────────────────────────

components:

  parameters:
    page:
      name: page
      in: query
      description: Page number (default 1)
      schema:
        type: integer
        default: 1
        minimum: 1
    limit:
      name: limit
      in: query
      description: Records per page (default 50)
      schema:
        type: integer
        default: 50
        minimum: 1
        maximum: 500
    intId:
      name: id
      in: path
      required: true
      description: Integer primary key
      schema:
        type: integer
    stringId:
      name: id
      in: path
      required: true
      description: String / UUID primary key
      schema:
        type: string
        format: uuid

  responses:
    NotFound:
      description: Record not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    BadRequest:
      description: Invalid request body
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Deleted:
      description: Record deleted
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: true

  schemas:

    # ── Shared ─────────────────────────────────────────────────────────────────

    Error:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: string

    Timestamps:
      type: object
      properties:
        CreatedAt:
          type: string
          format: date-time
        UpdatedAt:
          type: string
          format: date-time

    Attachment:
      type: object
      properties:
        AttachmentId:
          type: string
          format: uuid
        FileName:
          type: string
          example: document.pdf
