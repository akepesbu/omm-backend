  # ── Emails ───────────────────────────────────────────────────────────────────

  /api/emails:
    get:
      tags: [Emails]
      summary: List all emails
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/limit'
        - name: StatusId
          in: query
          schema: { type: integer }
        - name: CategoryId
          in: query
          schema: { type: integer }
        - name: AssignedToId
          in: query
          schema: { type: integer }
        - name: AssignmentId
          in: query
          schema: { type: integer }
        - name: EmailFrom
          in: query
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmailList'
    post:
      tags: [Emails]
      summary: Create an email (ItemId auto-generated if omitted)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailInput'
            examples:
              without_attachments:
                summary: Without attachments
                value:
                  Subject: Test email subject
                  EmailFrom: sender@example.com
                  EmailTo: claims@aon.com
                  EmailReceivedOn: '2026-04-15T10:00:00Z'
                  StatusId: 1
                  CategoryId: 1
                  AssignedToId: 1
                  AssignmentId: 1
                  Attachments: []
              with_attachments:
                summary: With attachments
                value:
                  Subject: Email with attachment
                  EmailFrom: sender@example.com
                  EmailTo: claims@aon.com
                  EmailReceivedOn: '2026-04-15T10:00:00Z'
                  StatusId: 1
                  CategoryId: 1
                  AssignedToId: 1
                  AssignmentId: 1
                  Attachments:
                    - FileName: document.pdf
                      FileSize: 102400
                      ContentType: application/pdf
                      AttachmentId: att-uuid-here
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmailSingle'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/emails/{id}:
