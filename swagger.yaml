  /api/events/by-item/{itemId}:
    get:
      tags: [Events]
      summary: Get all events for a specific email
      parameters:
        - name: itemId
          in: path
          required: true
          description: ItemId (UUID) of the email
          schema:
            type: string
            format: uuid
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/limit'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventList'

  /api/events/{id}:
    parameters:
      - $ref: '#/components/parameters/intId'
    get:
      tags: [Events]
      summary: Get an event by EventRecordId
      responses:
