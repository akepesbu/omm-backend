    put:
      tags: [Emails]
      summary: Update an email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailUpdate'
            examples:
              scalar_only:
                summary: Update scalar fields only
                value:
                  StatusId: 2
                  CategoryId: 1
                  AssignedToId: 1
              with_attachments:
                summary: Update with new attachments
                value:
                  StatusId: 2
                  Attachments:
                    - FileName: updated.pdf
                      FileSize: 204800
                      ContentType: application/pdf
                      AttachmentId: att-uuid-here
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmailSingle'
        '404':
