openapi: 3.0.3
info:
  title: OMM Backend API
  description: Email Management System backed by GCP BigQuery
  version: 1.0.0

servers:
  - url: http://localhost:3000
    description: Local development

tags:
  - name: Health
  - name: Status
  - name: Categories
  - name: Event Types
  - name: Countries
  - name: Line of Business
  - name: Mailboxes
  - name: Users
  - name: Mailbox Mappings
  - name: Emails
  - name: Events

paths:

  # ── Health ──────────────────────────────────────────────────────────────────

  /health:
    get:
      tags: [Health]
      summary: Health check
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  timestamp:
                    type: string
                    format: date-time

  # ── Status ──────────────────────────────────────────────────────────────────

  /api/status:
    get:
      tags: [Status]
      summary: List all statuses
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/limit'
        - name: StatusId
          in: query
          schema: { type: integer }
        - name: StatusName
          in: query
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusList'
    post:
      tags: [Status]
      summary: Create a status
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StatusInput'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusSingle'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/status/{id}:
    parameters:
      - $ref: '#/components/parameters/intId'
    get:
      tags: [Status]
      summary: Get a status by ID
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusSingle'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Status]
      summary: Update a status
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StatusInput'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusSingle'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Status]
      summary: Delete a status
      responses:
        '200':
          $ref: '#/components/responses/Deleted'
        '404':
          $ref: '#/components/responses/NotFound'

